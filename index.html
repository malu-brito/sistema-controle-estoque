<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Controle de Estoque</title>
    <script src="src/script.js" defer></script>
    <link rel="stylesheet" href="src/style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.1/font/bootstrap-icons.css"/>
</head>
<body>
  <header>
    <h1>DevStock</h1>

    <div id="search-container">
      <i class="bi bi-search"></i>
      <input
        type="text"
        id="search-input"
        placeholder="Busque por um produto..."
      />
    </div>

    <button id="export-stock">
      Exportar CSV <i class="bi bi-download"></i>
    </button>
  </header>

  <div class="app-container">

    <aside class="sidebar">
      <button onclick="trocarTela('estoque-tela')">📦 Estoque</button>
      <button onclick="trocarTela('add-tela')">➕ Adicionar</button>
      <button onclick="trocarTela('update-tela')">✏️ Atualizar</button>
      <button onclick="trocarTela('delete-tela')">🗑 Remover</button>
    </aside>

    <div class="main-container">
      <section id="estoque-tela" class="tela ativa">
        <div id="estoque-container"></div>
      </section>

      <section id="add-tela" class="tela">
        <div class="forms-container">

          <div class="add_product">
            <h2>Adicionar produto</h2>

            <label for="add-product-name">Adicione um produto:</label>
            <input id="add-product-name" type="text" name="product">

            <label for="add-product-quantity">Informe a quantidade do produto:</label>
            <input id="add-product-quantity" type="number" name="quantity">

            <label for="add-product-price">Informe o preço do produto:</label>
            <input id="add-product-price" type="number" name="price">

            <div>
              <button id="add-product-btn">Adicionar</button>
            </div>

            <p id="success-message" class="hide">Produto adicionado!</p>
          </div>

        </div>
      </section>

      <section id="update-tela" class="tela">
        <div class="forms-container">

          <div class="update_stock">
            <h2>Atualizar estoque</h2>

            <label for="update-product-id">Informe o código do produto que deseja editar:</label>
            <input id="update-product-id" type="number" name="product">

            <label for="update-product-name" class="hide">Informe o novo nome do produto:</label>
            <input id="update-product-name" class="hide" type="text" name="name">

            <label for="update-product-price" class="hide">Informe o novo preço do produto:</label>
            <input id="update-product-price" class="hide" type="text" name="price">

            <label for="update-product-quantity" class="hide">Informe a quantidade do produto que deseja adicionar:</label>
            <input id="update-product-quantity" class="hide" type="number" name="quantity">

            <div>
              <button id="update-stock-btn">Atualizar</button>
            </div>

          </div>

        </div>
      </section>

      <section id="delete-tela" class="tela">
        <div class="forms-container">

          <div class="delete_product">
            <h2>Deletar produto</h2>

            <label for="delete-product-name">Informe o nome do produto que deseja remover:</label>
            <input id="delete-product-name" type="text" name="product">

            <div>
              <button id="delete-product-btn">Remover</button>
            </div>

          </div>

        </div>
      </section>

    </div>
  </div>
</body>
</html>
